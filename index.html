<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="초등학생이 혼자 따라할 수 있는 3x3 루빅스 큐브 가이드. 전체화면 슬라이드와 영상 튜토리얼." />
    <meta property="og:title" content="큐브 배우기 (3학년용)" />
    <meta property="og:description" content="한 단계씩 차근차근 따라하면 큐브가 완성돼요!" />
    <title>큐브 배우기 (3학년용)</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <h1>큐브 배우기</h1>
        <p>한 단계씩 차근차근 따라하면, 큐브가 완성돼요!</p>
        <div class="hero-options">
          <div class="hero-card">
            <div class="hero-card-icon">📖</div>
            <div class="hero-card-title">튜토리얼 따라하기</div>
            <div class="hero-card-desc">단계별 설명과 3D 큐브로<br>차근차근 배워요</div>
            <button id="start-btn" class="btn btn-primary" type="button">시작하기 ▶</button>
          </div>
          <div class="hero-or">또는</div>
          <div class="hero-card">
            <div class="hero-card-icon">📷</div>
            <div class="hero-card-title">내 큐브 분석하기</div>
            <div class="hero-card-desc">지금 큐브를 찍으면<br>어디서 시작할지 알려줘요</div>
            <button id="scan-btn" class="btn btn-yellow" type="button">카메라로 찍기 ▶</button>
          </div>
        </div>
      </header>

      <footer class="footer">
        <p>
          <label style="display:inline-flex;align-items:center;gap:8px;">
            <input type="checkbox" id="tts-toggle" />
            <span>한국어 음성으로 읽어주기</span>
          </label>
        </p>
        <p style="margin-top:12px;">
          3D 큐브: <a href="https://js.cubing.net/cubing/" target="_blank" rel="noopener">cubing.js</a> (MPL-2.0) ·
          글꼴: <a href="https://github.com/orioncactus/pretendard" target="_blank" rel="noopener">Pretendard</a>
        </p>
        <p id="app-version" style="margin-top:6px;font-size:0.72rem;color:#aaa;"></p>
      </footer>
    </div>

    <div id="slideshow-root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
